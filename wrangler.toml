name = "zest-comply"
main = "worker/index.js"
compatibility_date = "2026-07-03"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

# Workers AI - powers the support chat widget (worker/index.js's
# /api/support-chat route). Free within Cloudflare's daily neuron
# allowance; no separate LLM API key/cost.
[ai]
binding = "AI"
